name: bslnd_app
description: BSLND organization Flutter mobile app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Location
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  permission_handler: ^11.1.0

  # Payment
  http: ^1.1.2
  dio: ^5.4.0

  # WebView
  webview_flutter: ^4.4.2

  # Audio
  just_audio: ^0.9.36
  just_audio_windows: ^0.2.2
  audio_service: ^0.18.11

  # PDF
  pdfx: ^2.9.2

  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  intl: ^0.18.1
  flutter_svg: ^2.0.9

  # Storage
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1

  # Utils
  url_launcher: ^6.2.2
  connectivity_plus: ^5.0.2
  go_router: ^13.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9
  custom_lint: ^0.5.7
  riverpod_lint: ^2.3.6

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
